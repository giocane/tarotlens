<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Panier — TarotLens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <style>
        .cart-page { max-width: 900px; margin: 0 auto; padding: 72px 40px; }
        .cart-page-title { font-family: var(--font-display); font-size: clamp(48px,8vw,80px); color: var(--orange); text-transform: uppercase; line-height: .9; margin-bottom: 40px; }
        .cart { display: grid; grid-template-columns: 1fr 320px; gap: 36px; align-items: start; }
        .cart-line { display: grid; grid-template-columns: 72px 1fr auto; gap: 16px; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(26,22,20,.1); }
        .cart-thumb { width: 72px; height: 72px; border-radius: 12px; display: grid; place-items: center; font-size: 30px; background: linear-gradient(135deg, #ddd5c0, #c8c0a8); color: rgba(255,255,255,.8); overflow: hidden; }
        .cart-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .cart-name { font-family: var(--font-display); font-size: 22px; text-transform: uppercase; color: var(--orange); line-height: 1; }
        .cart-meta { font-size: 13px; opacity: .6; margin-top: 3px; }
        .cart-remove { background: none; border: 0; color: var(--ink); opacity: .5; cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; margin-top: 6px; display: block; }
        .cart-remove:hover { color: var(--magenta); opacity: 1; }
        .cart-right { text-align: right; }
        .cart-line-price { font-weight: 700; font-size: 17px; margin-bottom: 8px; }
        .qty { display: inline-flex; align-items: center; border: 2px solid rgba(26,22,20,.15); border-radius: 980px; overflow: hidden; }
        .qty button { width: 38px; height: 38px; border: 0; background: transparent; font-size: 18px; cursor: pointer; }
        .qty button:hover { background: rgba(26,22,20,.06); }
        .qty input { width: 44px; text-align: center; border: 0; font: inherit; font-weight: 600; font-size: 15px; -moz-appearance: textfield; }
        .qty input::-webkit-outer-spin-button, .qty input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .cart-summary { background: var(--white); border-radius: var(--radius); padding: 28px; position: sticky; top: 100px; }
        .cart-summary h3 { font-family: var(--font-display); font-size: 28px; text-transform: uppercase; color: var(--orange); margin-bottom: 16px; }
        .sum-row { display: flex; justify-content: space-between; font-size: 15px; padding: 8px 0; }
        .sum-row.total { border-top: 1px solid rgba(26,22,20,.15); margin-top: 8px; padding-top: 14px; font-size: 20px; font-weight: 700; }
        .cart-summary .btn { width: 100%; text-align: center; margin-top: 16px; display: block; }
        .cart-empty { text-align: center; padding: 60px 20px; }
        .cart-empty-title { font-family: var(--font-display); font-size: 36px; color: var(--orange); text-transform: uppercase; margin-bottom: 12px; }
        .cart-order { max-width: 480px; }
        .contact-form { display: flex; flex-direction: column; gap: 16px; }
        .field { font-family: inherit; font-size: 15px; padding: 12px 16px; border: 2px solid rgba(26,22,20,.15); border-radius: 14px; background: var(--white); width: 100%; }
        .field:focus { outline: 0; border-color: var(--orange); }
        textarea.field { min-height: 100px; resize: vertical; }
        label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .sent-msg { font-weight: 700; font-size: 14px; margin-top: 8px; }
        @media (max-width: 680px) { .cart { grid-template-columns: 1fr; } .cart-summary { position: static; } .cart-page { padding: 48px 24px; } }
    </style>
</head>
<body>

<header class="nav" id="nav">
    <div class="nav-inner">
        <button class="lang-toggle" id="langToggle" type="button"></button>
        <a href="index.html" class="nav-logo" data-i18n-attr="aria-label:nav_homeAria">TAROTLENS</a>
        <div class="nav-row">
            <button class="nav-burger" id="navBurger" aria-label="Menu" aria-expanded="false"><span></span><span></span></button>
            <nav class="nav-links" id="navLinks">
                <a href="index.html#decks" data-i18n="nav_decks">LES DECKS</a>
                <a href="index.html#accessoires" data-i18n="nav_accessories">ACCESSOIRES</a>
                <a href="contact.html">CONTACT</a>
            </nav>
            <button class="nav-icon" data-i18n-attr="aria-label:nav_cartAria">
                <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" d="M6 8h12l-1 12H7L6 8Zm3 0a3 3 0 0 1 6 0"/></svg>
                <span class="nav-badge">0</span>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="cart-page">
        <h1 class="cart-page-title" data-i18n="cart_title">MON PANIER</h1>
        <div id="cartRoot"></div>
    </div>
</main>

<footer class="footer">
    <div class="footer-inner">
        <div class="footer-holo"></div>
        <div class="footer-info">
            <p data-i18n="footer_contactLine">Me contacter si vous avez des questions</p>
            <div class="footer-contacts">
                <a href="https://instagram.com/TarotLens">@TarotLens (Instagram)</a>
                <a href="mailto:TarotLens129@gmail.com">TarotLens129@gmail.com</a>
            </div>
        </div>
        <p class="footer-bye">SEE YOU THERE!</p>
        <div class="footer-legal-row">
            <a href="legal.html" data-i18n="footer_legalLink">Mentions légales</a>
            <span>© 2026 TarotLens</span>
        </div>
    </div>
</footer>

<script src="i18n.js?v=1"></script>
<script src="data.js?v=2"></script>
<script src="cart.js?v=2"></script>
<script src="products.js?v=1"></script>
<script src="panier.js?v=2"></script>
<script>
const burger = document.getElementById('navBurger');
const navLinks = document.getElementById('navLinks');
burger.addEventListener('click', () => { const o = navLinks.classList.toggle('open'); burger.setAttribute('aria-expanded', o); });
</script>
</body>
</html>
